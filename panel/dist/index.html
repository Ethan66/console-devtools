<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Console DevTools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f5f5f5;
    }
    .header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .control-panel {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .filter-input {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      font-size: 13px;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary {
      background: #1976d2;
      color: white;
    }
    .btn-danger {
      background: #d32f2f;
      color: white;
    }
    .log-container {
      padding: 16px;
      overflow: auto;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .log-item {
      margin-bottom: 8px;
      padding: 8px;
      background: white;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }
    .log-key {
      color: #1976d2;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .log-path {
      color: #666;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Console DevTools</h1>
  </div>
  <div class="control-panel">
    <input type="text" id="filterInput" class="filter-input" placeholder="输入关键字筛选...">
    <button id="clearBtn" class="btn btn-danger">清空树结构</button>
    <button id="exportBtn" class="btn btn-primary">导出JSON</button>
  </div>
  <div class="log-container" id="logContainer">
    <div class="empty-state">暂无日志数据</div>
  </div>

  <script>
    console.log('[Console DevTools] Panel loaded');

    const messages = [];
    const logContainer = document.getElementById('logContainer');
    const filterInput = document.getElementById('filterInput');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');

    // 连接到 background
    const port = chrome.runtime.connect({ name: 'console-devtools-panel' });

    port.onMessage.addListener((message) => {
      console.log('[Console DevTools] Received message:', message);

      if (message.type === 'BUFFERED_MESSAGES') {
        messages.push(...message.data);
      } else {
        messages.push(message);
      }

      renderLogs();
    });

    function renderLogs() {
      const filter = filterInput.value.trim().toLowerCase();

      const filteredMessages = filter
        ? messages.filter(msg => hasKeyword(msg, filter))
        : messages;

      if (filteredMessages.length === 0) {
        logContainer.innerHTML = '<div class="empty-state">' +
          (messages.length === 0 ? '暂无日志数据' : '未找到匹配的节点') +
        '</div>';
        return;
      }

      let html = '';
      filteredMessages.forEach(msg => {
        html += renderMessage(msg, 0);
      });
      logContainer.innerHTML = html;
    }

    function renderMessage(msg, level) {
      let html = '';
      const indent = level * 16;

      for (const [key, childMsg] of Object.entries(msg.zfn || {})) {
        html += '<div class="log-item" style="margin-left: ' + indent + 'px">';
        html += '<div class="log-key">' + key + '</div>';
        if (childMsg.path) {
          html += '<div class="log-path">' + childMsg.path + '</div>';
        }
        if (childMsg.zfn && Object.keys(childMsg.zfn).length > 0) {
          html += renderMessage(childMsg, level + 1);
        }
        html += '</div>';
      }

      return html;
    }

    function hasKeyword(msg, keyword) {
      const keys = Object.keys(msg.zfn || {});
      return keys.some(key => key.toLowerCase().includes(keyword));
    }

    filterInput.addEventListener('input', renderLogs);

    clearBtn.addEventListener('click', () => {
      messages.length = 0;
      renderLogs();
    });

    exportBtn.addEventListener('click', () => {
      if (messages.length === 0) {
        alert('暂无数据可导出');
        return;
      }

      const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
      const filename = 'console-devtools-' + timestamp + '.json';
      const data = JSON.stringify(messages, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    });

    // 初始渲染
    renderLogs();
  </script>
</body>
</html>
