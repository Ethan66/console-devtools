<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console DevTools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f5f5f5;
    }
    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .control-panel {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .filter-input {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      font-size: 13px;
    }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary {
      background: #1976d2;
      color: #fff;
    }
    .btn-danger {
      background: #d32f2f;
      color: #fff;
    }
    .log-container {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .log-tree {
      font-size: 12px;
    }
    .log-item {
      margin-bottom: 4px;
    }
    .log-item-header {
      display: flex;
      align-items: center;
      padding: 4px 0;
      cursor: pointer;
      user-select: none;
    }
    .log-item-header:hover {
      background: #f0f0f0;
    }
    .expand-icon {
      display: inline-block;
      width: 16px;
      text-align: center;
      color: #666;
      font-size: 10px;
    }
    .log-key {
      color: #1976d2;
      font-weight: 500;
    }
    .log-item-content {
      padding: 4px 0;
      border-left: 1px solid #e0e0e0;
      margin-left: 24px;
    }
    .log-row {
      display: flex;
      padding: 4px 8px;
      align-items: flex-start;
    }
    .log-label {
      color: #666;
      min-width: 60px;
      flex-shrink: 0;
    }
    .log-value {
      color: #333;
      word-break: break-all;
    }
    .copy-btn {
      margin-left: auto;
      padding: 2px 8px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
    }
    .copy-btn:hover {
      background: #1565c0;
    }
    .log-json {
      margin: 0;
      padding: 4px 8px;
      background: #f5f5f5;
      border-radius: 3px;
      font-size: 11px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Console DevTools</h1>
    </header>
    <main class="main">
      <div class="control-panel">
        <input type="text" id="filterInput" placeholder="输入关键字筛选..." class="filter-input" />
        <button id="clearBtn" class="btn btn-danger">清空树结构</button>
        <button id="exportBtn" class="btn btn-primary">导出 JSON</button>
      </div>
      <div class="log-container">
        <div id="logContent" class="log-tree"></div>
      </div>
    </main>
  </div>

  <script src="panel.js"></script>
</body>
</html>
