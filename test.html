<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Console DevTools 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1565c0;
    }
    .info {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    code {
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>Console DevTools 测试页面</h1>
  <button id="sendTestMessage">发送测试消息</button>
  <button id="sendMultiple">发送多条消息</button>

  <div class="info">
    <h3>使用说明：</h3>
    <ol>
      <li>打开 Chrome 开发者工具（F12）</li>
      <li>切换到 <strong>Console DevTools</strong> 面板</li>
      <li>点击上面的按钮发送测试消息</li>
      <li>在面板中查看过滤后的日志</li>
    </ol>
  </div>

  <script>
    const testMessage = {
    "onTest": {
        "params": { a: { key: 1, key2: { c: 2}} },
        "path": "src/pages/demo/sdkDemo.vue:150",
        "zfn": {
            "[computed] app": {
                "params": {},
                "path": "src/pages/demo/sdkDemo.vue:138",
                "zfn": {}
            }
        }
    }
}

    function useConsoleDevtools() {
      const EXTENSION_ID_KEY = '__CONSOLE_DEVTOOLS_EXTENSION_ID__'
      const state = {
        port: null,
        extensionId: window[EXTENSION_ID_KEY] || null,
      }

      function logError(type, message) {
        console.log(`%c console-devtools-${type}：`, 'background:#f56c6c;color:#fff;', message || 'error')
      }

      function resetConnection(type, message) {
        state.port = null
        logError(type, message)
      }

      function connect() {
        if (state.port) return true
        if (!state.extensionId) {
          logError('ready', '扩展还没有加载')
          return false
        }
        try {
          const nextPort = chrome.runtime.connect(state.extensionId, { name: 'console-devtools' })
          nextPort.onDisconnect.addListener(() => resetConnection('disconnected'))
          state.port = nextPort
          console.log('%c console-devtools-connected：', 'background:#67c23a;color:#fff;', 'success')
          return true
        } catch (e) {
          resetConnection('connect failed', e.message)
          return false
        }
      }

      function send(data) {
        if (!connect()) return
        try {
          state.port.postMessage(data)
        } catch (e) {
          resetConnection('send-failed', e.message)
          if (connect()) {
            state.port.postMessage(data)
          }
        }
      }

      window.addEventListener('console-devtools-ready', (e) => {
        const extId = e.detail?.extensionId
        console.log('%c console-devtools-ready: ', 'background:#67c23a;color:#fff;', 'success')
        if (!extId) return
        state.extensionId = extId
        window[EXTENSION_ID_KEY] = extId
        connect()
      })
      return { send }
    }

    const { send: sendToExtension } = useConsoleDevtools()

    document.getElementById('sendTestMessage').addEventListener('click', () => {
      sendToExtension(testMessage)
      console.log('✓ 测试消息已发送')
    })

    document.getElementById('sendMultiple').addEventListener('click', () => {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          sendToExtension(testMessage)
        }, i * 100)
      }
      console.log('✓ 多条消息已发送')
    })

    // 自动发送一条消息用于演示
    setTimeout(() => {
      sendToExtension(testMessage)
      console.log('✓ 自动发送的测试消息')
    }, 1000)
  </script>
</body>
</html>
