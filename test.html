<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Console DevTools 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1565c0;
    }
    .info {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    code {
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>Console DevTools 测试页面</h1>
  <button id="sendTestMessage">发送测试消息</button>
  <button id="sendMultiple">发送多条消息</button>

  <div class="info">
    <h3>使用说明：</h3>
    <ol>
      <li>打开 Chrome 开发者工具（F12）</li>
      <li>切换到 <strong>Console DevTools</strong> 面板</li>
      <li>点击上面的按钮发送测试消息</li>
      <li>在面板中查看过滤后的日志</li>
    </ol>
  </div>

  <script>
    const testMessage = {
      params: {
        val: true
      },
      path: "src/pages/borrow/components/first-enjoy-bind-card.vue:100",
      zfn: {
        handleGetPage: {
          params: {},
          path: "src/pages/borrow/mixins/first-enjoy.js:235",
          zfn: {
            "[computed] reqPageType": {
              params: {},
              path: "src/pages/borrow/mixins/first-enjoy.js:52",
              zfn: {}
            }
          }
        },
        "[watch] showDialog": {
          params: {
            val: true
          },
          path: "src/pages/borrow/components/first-enjoy-bind-card.vue:115",
          zfn: {}
        },
        "[computed] mainDianPageCode": {
          params: {},
          path: "src/pages/borrow/mixins/first-enjoy.js:67",
          zfn: {}
        },
        setCardName: {
          params: {},
          path: "src/pages/borrow/mixins/first-enjoy.js:309",
          zfn: {}
        }
      }
    }

    // 保持连接端口
    let port = null
    let isExtensionReady = false

    // 获取扩展 ID（由 content script 注入）
    function getExtensionId() {
      return window.__CONSOLE_DEVTOOLS_EXTENSION_ID__
    }

    // 初始化连接
    function initPort() {
      const extId = getExtensionId()
      if (!extId) {
        console.log('[test.html] 扩展 ID 未注入，等待 content script...')
        return false
      }
      try {
        port = chrome.runtime.connect(extId, { name: 'console-devtools' })
        console.log('[test.html] 连接成功，extensionId:', extId)
        port.onDisconnect.addListener(() => {
          console.log('[test.html] 连接已断开')
          port = null
          isExtensionReady = false
        })
        isExtensionReady = true
        return true
      } catch (e) {
        console.log('[test.html] 连接失败:', e.message)
        return false
      }
    }

    // 发送消息
    function sendToExtension(data) {
      if (!isExtensionReady) {
        if (!initPort()) {
          console.log('[test.html] 跳过发送')
          return
        }
      }
      try {
        port.postMessage(data)
      } catch (e) {
        console.log('[test.html] 发送失败，尝试重新连接:', e.message)
        isExtensionReady = false
        port = null
        if (initPort()) {
          port.postMessage(data)
        }
      }
    }

    // 监听扩展就绪事件 - 设置扩展 ID 并初始化连接
    window.addEventListener('console-devtools-ready', (e) => {
      const extId = e.detail?.extensionId || getExtensionId()
      console.log('[test.html] 扩展已就绪，ID:', extId)
      if (extId) {
        window.__CONSOLE_DEVTOOLS_EXTENSION_ID__ = extId
        isExtensionReady = true
        // 延迟初始化，确保扩展 ID 已设置
        setTimeout(() => initPort(), 0)
      }
    })

    document.getElementById('sendTestMessage').addEventListener('click', () => {
      sendToExtension(testMessage)
      console.log('✓ 测试消息已发送')
    })

    document.getElementById('sendMultiple').addEventListener('click', () => {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          sendToExtension(testMessage)
        }, i * 100)
      }
      console.log('✓ 多条消息已发送')
    })

    // 自动发送一条消息用于演示
    setTimeout(() => {
      sendToExtension(testMessage)
      console.log('✓ 自动发送的测试消息')
    }, 1000)
  </script>
</body>
</html>
